services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      local-ai-internal:
        aliases:
          - qdrant
    expose:
      - "6333"
      - "6334"

  docker-guard:
    build: ./docker-guard
    container_name: hw-docker-guard
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      ALLOWED_LABELS: "docker-guard.allow"
      ALLOWED_PREFIXES: ""
      LISTEN_PORT: "2375"
    networks:
      - local-ai-internal

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      local-ai-internal:
        aliases:
          - ollama

  rag-worker:
    build: ./rag-worker
    container_name: rag-worker
    restart: unless-stopped
    env_file: .env
    environment:
      NEXTCLOUD_URL: "${NEXTCLOUD_URL:-}"
      NEXTCLOUD_USER: "${NEXTCLOUD_USER:-}"
      NEXTCLOUD_APP_PASSWORD: "${NEXTCLOUD_APP_PASSWORD:-}"
      NEXTCLOUD_SYNC_INTERVAL: "${NEXTCLOUD_SYNC_INTERVAL:-600}"
      LOCAL_DATASHEETS_DIR: "/datasheets"
      OUTLINE_URL: "${OUTLINE_URL:-}"
      OUTLINE_API_KEY: "${OUTLINE_API_KEY:-}"
      OUTLINE_SYNC_INTERVAL: "${OUTLINE_SYNC_INTERVAL:-300}"
      OUTLINE_QDRANT_COLLECTION: "${OUTLINE_QDRANT_COLLECTION:-outline_docs}"
    volumes:
      - ./datasheets:/datasheets:ro
    networks:
      - local-ai-internal
      - nextcloud-rag
      - traefik

  rag-mcp:
    build: ./rag-mcp
    container_name: rag-mcp
    restart: unless-stopped
    env_file: .env
    networks:
      - local-ai-internal
      - traefik
    labels:
      traefik.enable: true
      traefik.http.routers.rag-mcp.rule: Host(`${SUB_DOMAIN}.${SERVER_DOMAIN}`)
      traefik.http.routers.rag-mcp.entrypoints: websecure
      traefik.http.routers.rag-mcp.tls: true
      traefik.http.services.rag-mcp.loadbalancer.server.port: 8081

  paperclip-mcp:
    build: ./paperclip-mcp
    container_name: paperclip-mcp
    restart: unless-stopped
    environment:
      PAPERCLIP_API_URL: "http://paperclip-server:3100/api"
    networks:
      - local-ai-internal
      - traefik
    labels:
      traefik.enable: true
      traefik.http.routers.paperclip-mcp.rule: Host(`mcp.${SERVER_DOMAIN}`)
      traefik.http.routers.paperclip-mcp.entrypoints: websecure
      traefik.http.routers.paperclip-mcp.tls: true
      traefik.http.services.paperclip-mcp.loadbalancer.server.port: 8082

  nextcloud-mcp:
    build: ./nextcloud-mcp
    container_name: nextcloud-mcp
    restart: unless-stopped
    environment:
      NEXTCLOUD_URL: "${NEXTCLOUD_URL:-}"
      NEXTCLOUD_USER: "${NEXTCLOUD_USER:-}"
      NEXTCLOUD_APP_PASSWORD: "${NEXTCLOUD_APP_PASSWORD:-}"
      NEXTCLOUD_MCP_API_KEY: "${NEXTCLOUD_MCP_API_KEY:-}"
    networks:
      - local-ai-internal
      - nextcloud-rag

  hermes-gateway:
    build:
      context: ./hermes-gateway
      dockerfile: Dockerfile
    container_name: hermes-gateway
    restart: unless-stopped
    depends_on:
      paperclip-server:
        condition: service_started
      docker-guard:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://paperclip:paperclip@paperclip-db:5432/paperclip"
      PAPERCLIP_API_URL: "http://paperclip-server:3100/api"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      HERMES_API_SERVER_KEY: "${HERMES_API_SERVER_KEY:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      TELEGRAM_ALLOWED_USERS: "${TELEGRAM_ALLOWED_USERS:-}"
      # zai provider keys (credential pool rotates on quota exhaustion)
      GLM_API_KEY: "${GLM_API_KEY:-}"
      ZAI_API_KEY: "${ZAI_API_KEY:-}"
      Z_AI_API_KEY: "${Z_AI_API_KEY:-}"
      GLM_BASE_URL: "${GLM_BASE_URL:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      FAL_KEY: "${FAL_KEY:-}"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
      PARALLEL_API_KEY: "${PARALLEL_API_KEY:-}"
      MCP_RAG_API_KEY: "${MCP_RAG_API_KEY:-}"
      MCP_RAG_URL: "${MCP_RAG_URL:-}"
      MCP_OUTLINE_API_KEY: "${MCP_OUTLINE_API_KEY:-}"
      MCP_OUTLINE_URL: "${MCP_OUTLINE_URL:-}"
      MEMORY_API_KEY: "${MEMORY_API_KEY:-}"
      NEXTCLOUD_MCP_API_KEY: "${NEXTCLOUD_MCP_API_KEY:-}"
      PAPERCLIP_DATA_PATH: "/paperclip"
      OUTLINE_URL: "${OUTLINE_URL:-}"
      OUTLINE_API_KEY: "${OUTLINE_API_KEY:-}"
      OUTLINE_DB_URL: "${OUTLINE_DB_URL:-}"
      TEAM_SKILLS_API_KEY: "${TEAM_SKILLS_API_KEY:-}"
      SKILLS_SYNC_TOKEN: "${SKILLS_SYNC_TOKEN:-}"
    volumes:
      - hermes_instances:/paperclip/hermes-instances
      - paperclip_data:/paperclip:ro
      - hermes_profiles:/root/.hermes/profiles
      - hermes_venv:/opt/hermes-venv
      - hermes_src:/opt/hermes-agent-build
      - ./hermes-agent:/opt/hermes-agent:ro
      - ./hermes-shared-config:/opt/hermes-shared-config:ro
      - ./hermes-gateway/skills:/opt/skills:ro
      - ./hermes-gateway/orchestrator/agent_api_keys.json:/opt/orchestrator/agent_api_keys.json:ro
      - /mnt/services/suckless-shopping:/mnt/services/suckless-shopping
      - gateway_ports:/run/gateway-ports
    networks:
      - local-ai-internal
      - outline_internal

  paperclip-db:
    image: postgres:17-alpine
    container_name: paperclip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - paperclip_pgdata:/var/lib/postgresql/data
    networks:
      - local-ai-internal

  paperclip-server:
    image: paperclip-server:latest
    container_name: paperclip-server
    restart: unless-stopped
    depends_on:
      paperclip-db:
        condition: service_healthy
    entrypoint: ["/opt/paperclip-entrypoint.sh"]
    command: ["node", "--import", "./server/node_modules/tsx/dist/loader.mjs", "server/dist/index.js"]
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@paperclip-db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "https://${PAPERCLIP_SUB_DOMAIN:-paperclip}.${SERVER_DOMAIN}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      PAPERCLIP_AGENT_JWT_SECRET: "${BETTER_AUTH_SECRET}"
      # zai provider keys (credential pool rotates on quota exhaustion)
      GLM_API_KEY: "${GLM_API_KEY:-}"
      ZAI_API_KEY: "${ZAI_API_KEY:-}"
      Z_AI_API_KEY: "${Z_AI_API_KEY:-}"
      GLM_BASE_URL: "${GLM_BASE_URL:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      FAL_KEY: "${FAL_KEY:-}"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
      PARALLEL_API_KEY: "${PARALLEL_API_KEY:-}"
      MCP_RAG_API_KEY: "${MCP_RAG_API_KEY:-}"
      MCP_RAG_URL: "${MCP_RAG_URL:-}"
      MCP_OUTLINE_API_KEY: "${MCP_OUTLINE_API_KEY:-}"
      MCP_OUTLINE_URL: "${MCP_OUTLINE_URL:-}"
      HERMES_API_SERVER_KEY: "${HERMES_API_SERVER_KEY:-}"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      PAPERCLIP_ALLOWED_ATTACHMENT_TYPES: "*"
      HERMES_GATEWAY_TEAM_SKILLS_URL: "http://hermes-gateway:8681"
      TEAM_SKILLS_API_KEY: "${TEAM_SKILLS_API_KEY:-}"
      SKILLS_SYNC_TOKEN: "${SKILLS_SYNC_TOKEN:-}"
    volumes:
      - paperclip_data:/paperclip
      - /mnt/services/gladiator/agents:/mnt/services/gladiator/agents
      - ./hermes-agent:/opt/hermes-agent:ro
      - ./hermes-shared-config:/opt/hermes-shared-config:ro
      - hermes_src:/opt/hermes-agent-build
      - ./paperclip-entrypoint.sh:/opt/paperclip-entrypoint.sh:ro
      - hermes_venv:/opt/hermes-venv
      - hermes_instances:/paperclip/hermes-instances
      - ./hermes-paperclip-adapter/dist/shared/constants.js:/app/node_modules/.pnpm/hermes-paperclip-adapter@0.2.0/node_modules/hermes-paperclip-adapter/dist/shared/constants.js:ro
      - ./hermes-paperclip-adapter/dist/index.js:/app/node_modules/.pnpm/hermes-paperclip-adapter@0.2.0/node_modules/hermes-paperclip-adapter/dist/index.js:ro
      - ./hermes-paperclip-adapter/dist/server/index.js:/app/node_modules/.pnpm/hermes-paperclip-adapter@0.2.0/node_modules/hermes-paperclip-adapter/dist/server/index.js:ro
      - ./hermes-paperclip-adapter/dist/server/models.js:/app/node_modules/.pnpm/hermes-paperclip-adapter@0.2.0/node_modules/hermes-paperclip-adapter/dist/server/models.js:ro
      - ./hermes-paperclip-adapter/dist/server/test.js:/app/node_modules/.pnpm/hermes-paperclip-adapter@0.2.0/node_modules/hermes-paperclip-adapter/dist/server/test.js:ro
      - ./hermes-paperclip-adapter/dist/server/execute.js:/app/node_modules/.pnpm/hermes-paperclip-adapter@0.2.0/node_modules/hermes-paperclip-adapter/dist/server/execute.js:ro
      - ./paperclip/ui/dist:/app/ui/dist
      - ./patches/company-skills.js:/app/server/dist/routes/company-skills.js:ro
      - ./patches/company-skills-service.js:/app/server/dist/services/company-skills.js:ro
      - ./paperclip/ui/src:/app/ui/src:ro
      - gateway_ports:/run/gateway-ports:ro
      - ./paperclip/packages/shared/src:/app/packages/shared/src:ro
      - ./paperclip/packages/db/src:/app/packages/db/src:ro
    networks:
      - local-ai-internal
      - traefik
    labels:
      traefik.enable: true
      traefik.http.routers.paperclip.rule: Host(`${PAPERCLIP_SUB_DOMAIN:-paperclip}.${SERVER_DOMAIN}`)
      traefik.http.routers.paperclip.entrypoints: websecure
      traefik.http.routers.paperclip.tls: true
      traefik.http.services.paperclip.loadbalancer.server.port: 3100

volumes:
  qdrant_data:
    external: true
    name: n8n_qdrant_data
  ollama_data:
    external: true
    name: n8n_ollama_data
  paperclip_pgdata:
    external: true
    name: paperclip_pgdata
  paperclip_data:
    external: true
    name: paperclip_paperclip-data
  hermes_venv:
    name: hermes_venv
  hermes_instances:
    name: hermes_instances
  hermes_src:
    name: hermes_src
  gateway_ports:
    name: gateway_ports
  hermes_profiles:
    name: hermes_profiles

networks:
  local-ai-internal:
    name: local-ai-internal
    external: true
  nextcloud-rag:
    name: nextcloud-rag
    external: true
  traefik:
    name: traefik-public
    external: true
  outline_internal:
    name: outline_internal
    external: true
