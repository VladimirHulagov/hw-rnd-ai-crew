apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-operator
  namespace: agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-operator
  namespace: agents
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-operator
  namespace: agents
subjects:
  - kind: ServiceAccount
    name: agent-operator
    namespace: agents
roleRef:
  kind: Role
  name: agent-operator
  apiGroup: rbac.authorization.k8s.io
